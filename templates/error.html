{% extends "base.html" %}
{% block title %}Error {{ code }} — SecureDocs{% endblock %}
{% block content %}
<div style="text-align:center; padding:4rem 1rem;">
  <h1 style="font-size:4rem; color:#ccc; margin-bottom:0.5rem;">{{ code }}</h1>
  <p style="margin-bottom:1.5rem;">{{ message }}</p>
  <a href="{{ url_for('dashboard') if g.user else url_for('index') }}" class="btn btn-secondary">Go Back</a>
</div>
{% endblock %}

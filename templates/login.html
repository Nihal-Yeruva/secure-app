{% extends "base.html" %}
{% block title %}Sign In — SecureDocs{% endblock %}
{% block content %}
<div style="max-width:400px; margin:3rem auto;">
  <h1>Sign In</h1>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <div class="card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required maxlength="20" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
    </form>
  </div>
  <p class="muted" style="text-align:center;">No account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
